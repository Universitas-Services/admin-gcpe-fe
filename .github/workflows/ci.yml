name: CI/CD - Calidad y Despliegue Dinámico

on:
  push:
    branches: ['main', 'dev']
  pull_request:
    branches: ['main', 'dev']

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Tests Unitarios
        run: npm run test -- --run

      - name: Build
        run: npm run build

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'))
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar Vercel CLI
        run: npm install --global vercel@latest

      - name: Desplegar a Vercel
        id: vercel_action
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" && "${{ github.event_name }}" == "push" ]]; then
            VERCEL_ENV="production"
            VERCEL_ARGS="--prod"
          else
            VERCEL_ENV="preview"
            VERCEL_ARGS="" 
          fi

          vercel pull --yes --environment=$VERCEL_ENV --token=$VERCEL_TOKEN
          vercel build $VERCEL_ARGS --token=$VERCEL_TOKEN
          DEPLOY_URL=$(vercel deploy --prebuilt $VERCEL_ARGS --token=$VERCEL_TOKEN)
          
          echo "url=$DEPLOY_URL" >> $GITHUB_OUTPUT
          
          echo "### 🚀 Despliegue en Vercel Exitoso" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Entorno | URL |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- |" >> $GITHUB_STEP_SUMMARY
          echo "| **$VERCEL_ENV** | [Visitar Sitio 🔗]($DEPLOY_URL) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> _El despliegue se ha completado correctamente._" >> $GITHUB_STEP_SUMMARY

      - name: Comentar Link en el PR
        uses: actions/github-script@v6
        if: github.event_name == 'pull_request'
        with:
          script: |
            const url = '${{ steps.vercel_action.outputs.url }}';
            const body = `### 🚀 Preview Disponible\n\n| Entorno | Estado | Link |\n| :--- | :--- | :--- |\n| **Preview** | ✅ Listo | **[Visitar Sitio](${url})** |\n\n> _Desplegado automáticamente por GitHub Actions._`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            })
